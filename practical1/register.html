<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width" initial-scale="1.0">
        <title>Register account</title>
       
    </head>
    <body>
        <form>

            <h3>Personal Info</h3>
            
            <lable for="fname">Full Name:  </lable>
            <input type="text" name="fname" placeholder="Full Name"><br><br>

            <label for="femail">Email :</label>
            <input type="email" name="femail" placeholder="Email Id"><br><br>


            <label for="fpassword">Password :</label>
            <input type="password" name="password" placeholder="password"><br><br>

            <label for="radio">Male</label>
            <input type="radio" name="radio" value="Male">


            <label for="radio">Female</label>
            <input type="radio" name="radio" value="Male"><br><br><br>

            <label for="dob">DOB:</label>
            <input type="date" name="dob" min="2025-06-01" max="2026-07-22">
        </form>    
        <form>
                <h3>Education</h3>

                <label for="radio">10<sup>th</sup>Pass</label>
                <input type="radio" name="radio" value="10thpass">

                <label for="radio">12<sup>th</sup>Pass</label>
                <input type="radio" name="radio" value="12thpass">

                <label for="radio">Graduated</label>
                <input type="radio" name="radio" value="Graduated">
        </form>
        <br><br>

        <button>Submit</button>
        
    </body>
</html>
